<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger Desk — AI Bookkeeping & Reconciliation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0F3D2E; --green-2:#185c44; --gold:#C9A227; --gold-soft:#e7d39a;
    --paper:#FAF8F3; --paper-2:#F2EEE3; --ink:#1A1A17; --muted:#6b6a5f;
    --line:#d9d3c4; --ok:#1f7a4d; --warn:#b8860b; --bad:#b23b34;
    --ok-bg:#e6f3ea; --warn-bg:#fbf3da; --bad-bg:#f8e7e5;
    --shadow:0 1px 2px rgba(26,26,23,.06),0 8px 24px rgba(15,61,46,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;}
  .num{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
  h1,h2,h3,.serif{font-family:'Spectral',Georgia,serif}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--green-2)}
  .app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  .side{background:var(--green);color:#eef0e9;padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px}
  .brand{display:flex;align-items:baseline;gap:8px;margin-bottom:18px;padding:0 6px}
  .brand .mark{font-family:'Spectral',serif;font-size:22px;font-weight:600;color:#fff;letter-spacing:.3px}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block;margin-bottom:2px}
  .brand small{display:block;color:var(--gold-soft);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:4px;overflow:auto}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:none;color:#d7ddd2;padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:500;transition:.15s}
  .nav button .ic{width:18px;text-align:center;opacity:.9}
  .nav button:hover{background:rgba(255,255,255,.07);color:#fff}
  .nav button.active{background:var(--gold);color:#3a2e05;font-weight:600}
  .side .foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:10px;border-top:1px solid rgba(255,255,255,.12)}
  .side .foot button{background:rgba(255,255,255,.08);border:none;color:#dfe6db;padding:8px;border-radius:7px;font-size:12.5px;font-weight:600}
  .side .foot button:hover{background:rgba(255,255,255,.16)}
  .side .foot .note{font-size:10.5px;color:#9fb0a4;line-height:1.4}
  .main{padding:30px 38px 80px;max-width:1180px}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;border-bottom:1px solid var(--line);padding-bottom:14px;gap:16px;flex-wrap:wrap}
  .page-head h1{margin:0;font-size:30px;font-weight:600;letter-spacing:-.2px}
  .page-head p{margin:4px 0 0;color:var(--muted);font-size:13.5px;max-width:640px}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600;font-family:'Inter'}
  .btn{border:1px solid var(--green);background:var(--green);color:#fff;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13.5px;transition:.15s}
  .btn:hover{background:var(--green-2);border-color:var(--green-2)}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#3a2e05}
  .btn.gold:hover{filter:brightness(1.05)}
  .btn.ghost{background:#fff;color:var(--green);border-color:var(--line)}
  .btn.ghost:hover{border-color:var(--green);background:var(--paper-2)}
  .btn.sm{padding:5px 11px;font-size:12.5px;border-radius:7px}
  .btn.danger{background:#fff;color:var(--bad);border-color:#e3c4c1}
  .btn.danger:hover{background:var(--bad-bg)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
  .card .hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .card .hd h3{margin:0;font-size:16px;font-weight:600}
  .card .bd{padding:18px}
  .grid{display:grid;gap:16px}
  .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)} .g2{grid-template-columns:1fr 1fr}
  table{width:100%;border-collapse:collapse}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);font-weight:600;background:var(--paper-2)}
  td{padding:9px 12px;border-bottom:1px solid #ece7da;font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .right{text-align:right} .center{text-align:center} .muted{color:var(--muted)}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
  .stat .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}
  .stat .val{font-size:25px;font-weight:600;margin-top:6px;font-family:'JetBrains Mono';letter-spacing:-.5px}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .field label{font-size:12px;font-weight:600;color:#444}
  .field input,.field select,.field textarea{padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;width:100%}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green-2);box-shadow:0 0 0 3px rgba(24,92,68,.1)}
  .row{display:flex;gap:12px} .row > *{flex:1}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;font-family:'Inter'}
  .chip.ok{background:var(--ok-bg);color:var(--ok)} .chip.warn{background:var(--warn-bg);color:var(--warn)}
  .chip.bad{background:var(--bad-bg);color:var(--bad)} .chip.neutral{background:var(--paper-2);color:var(--muted)}
  .drop{border:2px dashed var(--line);border-radius:12px;padding:34px;text-align:center;background:#fff;transition:.15s;cursor:pointer}
  .drop:hover,.drop.over{border-color:var(--green-2);background:var(--paper-2)}
  .drop .big{font-size:17px;font-weight:600;color:var(--green)}
  .preview{max-width:100%;max-height:340px;border-radius:8px;border:1px solid var(--line);display:block;margin:0 auto}
  .banner{border-radius:10px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;font-size:13.5px}
  .banner.warn{background:var(--warn-bg);border:1px solid #ecd9a0;color:#6b5208}
  .banner.bad{background:var(--bad-bg);border:1px solid #e8c4c0;color:#8a2f29}
  .banner.ok{background:var(--ok-bg);border:1px solid #bfe0cc;color:#155c38}
  .banner .ic{font-size:18px;line-height:1.2}
  .empty{text-align:center;padding:46px 20px;color:var(--muted)}
  .empty .ic{font-size:34px;opacity:.5}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px}
  .spinner.dark{border-color:rgba(15,61,46,.2);border-top-color:var(--green)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13.5px;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:300;opacity:0;transition:.25s;font-weight:500}
  .toast.show{opacity:1;bottom:34px}
  .modal-bg{position:fixed;inset:0;background:rgba(26,26,23,.45);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px}
  .modal{background:#fff;border-radius:14px;max-width:600px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .conf-bar{height:5px;border-radius:3px;background:var(--paper-2);overflow:hidden;width:60px;display:inline-block;vertical-align:middle}
  .conf-bar > i{display:block;height:100%}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;width:fit-content}
  .seg button{border:none;background:#fff;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted)}
  .seg button.active{background:var(--green);color:#fff}
  .search{padding:8px 11px;border:1px solid var(--line);border-radius:8px;min-width:200px;background:#fff}
  /* lock screen */
  .lock{position:fixed;inset:0;background:linear-gradient(160deg,#0F3D2E,#0a2a20);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
  .lockcard{background:#fff;border-radius:16px;max-width:380px;width:100%;padding:30px 28px;box-shadow:0 30px 80px rgba(0,0,0,.4);text-align:center}
  .lockcard .mk{font-family:'Spectral',serif;font-size:26px;font-weight:600;color:var(--green)}
  .lockcard .mk .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block}
  .pininp{font-family:'JetBrains Mono';font-size:24px;letter-spacing:8px;text-align:center;padding:12px;border:1px solid var(--line);border-radius:10px;width:100%;margin-top:18px}
  .pininp:focus{outline:none;border-color:var(--green-2);box-shadow:0 0 0 3px rgba(24,92,68,.12)}
  @media (max-width:860px){
    .app{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center}
    .nav{flex-direction:row;flex-wrap:wrap} .side .foot{display:none}
    .main{padding:20px 16px 70px} .g3,.g4,.g2{grid-template-columns:1fr 1fr}
  }
  @media print{.side,.page-head .btn,.no-print{display:none!important}.app{display:block}.main{padding:0}.card{box-shadow:none;border:none}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

<script>
/* ============================================================
   Ledger Desk v2 — AI bookkeeping system
   Works as a Claude artifact AND as a standalone hosted file.
   ============================================================ */
const IS_BROWSER = typeof document !== 'undefined';

/* ---------- helpers ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,p={},...kids)=>{const e=document.createElement(t);for(const k in p){if(k==='class')e.className=p[k];else if(k==='html')e.innerHTML=p[k];else if(k.startsWith('on'))e.addEventListener(k.slice(2),p[k]);else if(p[k]!=null)e.setAttribute(k,p[k]);}kids.flat().forEach(c=>e.append(c?.nodeType?c:document.createTextNode(c??'')));return e;};
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayISO = ()=>new Date().toISOString().slice(0,10);
function toast(msg){const t=$('#toast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
function daysBetween(a,b){return Math.floor((new Date(b)-new Date(a))/864e5);}

/* ---------- storage: artifact API, else localStorage, else memory ---------- */
const mem = {};
const STORE = (()=>{
  const hasArtifact = (typeof window!=='undefined') && window.storage && window.storage.get;
  const hasLS = (typeof window!=='undefined') && window.localStorage;
  return {
    async get(k){ if(hasArtifact){try{const r=await window.storage.get(k);return r?r.value:null;}catch(e){return null;}}
      if(hasLS){return window.localStorage.getItem(k);} return mem[k]??null; },
    async set(k,v){ if(hasArtifact){try{await window.storage.set(k,v);return true;}catch(e){}}
      if(hasLS){try{window.localStorage.setItem(k,v);return true;}catch(e){}} mem[k]=v;return true; }
  };
})();
const DB = {
  async get(key,fallback){ const raw=await STORE.get(key); if(raw==null)return fallback; try{return JSON.parse(raw);}catch(e){return fallback;} },
  async set(key,val){ return STORE.set(key,JSON.stringify(val)); }
};

/* ---------- crypto for PIN ---------- */
async function sha256(text){
  const data=new TextEncoder().encode(text);
  const buf=await (globalThis.crypto||crypto).subtle.digest('SHA-256',data);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ---------- state ---------- */
const state = {
  settings:{ company:'Sheikh Oil Industries', tagline:'Edible Oils — Manufacturing, Refining & Export', address:'Karachi, Pakistan', phone:'', email:'', website:'sheikhoil.com', ntn:'', strn:'', bankName:'', bankAccount:'', bankIban:'', logo:'', invoiceTerms:'Payment due within 7 days. Please reference the invoice number with your payment.', currency:'PKR', taxRate:0 },
  bank:[], books:[], invoices:[], parties:[], ledger:[], expenses:[], recon:{}
};
async function loadAll(){
  state.settings = Object.assign({}, state.settings, await DB.get('settings', {}));
  state.bank=await DB.get('bank',[]); state.books=await DB.get('books',[]);
  state.invoices=await DB.get('invoices',[]); state.parties=await DB.get('parties',[]);
  state.ledger=await DB.get('ledger',[]); state.expenses=await DB.get('expenses',[]);
  state.recon=await DB.get('recon',{});
}
const save=(k)=>DB.set(k,state[k]);
function saveAll(){['settings','bank','books','invoices','parties','ledger','expenses','recon'].forEach(save);}

/* ---------- money ---------- */
function money(n){const c=state.settings.currency||'PKR';const v=Number(n)||0;try{return new Intl.NumberFormat('en-US',{style:'currency',currency:c,minimumFractionDigits:2}).format(v);}catch(e){return c+' '+v.toFixed(2);}}
function fmtN(n){return (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ---------- invoice math (pure) ---------- */
function invoiceSub(i){return (i.items||[]).reduce((s,it)=>s+(+it.qty||0)*(+it.rate||0),0);}
function invoiceTotal(i){const s=invoiceSub(i);return s+s*((+i.taxRate||0)/100);}
function paidAmount(i){return (i.payments||[]).reduce((s,p)=>s+(+p.amount||0),0);}
function invoiceOutstanding(i){return Math.max(0, invoiceTotal(i)-paidAmount(i));}
function invoiceStatus(i,today){
  today=today||todayISO();
  const out=invoiceOutstanding(i);
  if(out<0.01) return 'Paid';
  if(i.dueDate && daysBetween(i.dueDate,today)>0) return 'Overdue';
  if(paidAmount(i)>0.01) return 'Partial';
  return 'Unpaid';
}
function nextInvoiceNo(){return 'INV-'+String(state.invoices.length+1).padStart(4,'0');}

/* ---------- reconciliation (pure core) ---------- */
function computeMatches(bank,books){
  const bk=bank.map(b=>({...b})), kk=books.map(k=>({...k}));
  bk.forEach(b=>b._m=null); kk.forEach(k=>k._m=null);
  const pairs=[];
  bk.forEach(b=>{
    if(b._m) return; let best=null,score=1e9;
    kk.forEach(k=>{
      if(k._m) return;
      if(Math.abs((+b.amount)-(+k.amount))>0.01) return;
      const dd=Math.abs(daysBetween(k.date,b.date)); if(dd>7) return;
      let sc=dd; if(b.ref&&k.ref&&(''+b.ref).toLowerCase()===(''+k.ref).toLowerCase()) sc-=10;
      if(sc<score){score=sc;best=k;}
    });
    if(best){b._m=best.id;best._m=b.id;pairs.push([b.id,best.id]);}
  });
  return pairs;
}

/* ---------- party balance (pure) ---------- */
function partyBalance(p){
  const opening=+p.opening||0;
  const moves=state.ledger.filter(l=>l.partyId===p.id).reduce((s,l)=>s+(+l.debit||0)-(+l.credit||0),0);
  return opening+moves;
}
function partyName(n){return n||'—';}
function partyIdByName(name){const p=state.parties.find(p=>p.name.toLowerCase()===(name||'').toLowerCase());return p?p.id:null;}
function ensureParty(name){if(!name)return;if(!state.parties.some(p=>p.name.toLowerCase()===name.toLowerCase())){state.parties.push({id:uid(),name,kind:'Customer',phone:'',opening:0});save('parties');}}

/* ---------- aging (pure) ---------- */
function agingBuckets(today){
  today=today||todayISO();
  const b={current:0,d30:0,d60:0,d90:0};
  state.invoices.forEach(i=>{
    const out=invoiceOutstanding(i); if(out<0.01)return;
    const ref=i.dueDate||i.date; const age=daysBetween(ref,today);
    if(age<=0)b.current+=out; else if(age<=30)b.d30+=out; else if(age<=60)b.d60+=out; else b.d90+=out;
  });
  return b;
}

/* independent verification: do the read figures reconcile to the printed closing balance?
   Tries both orientations (credit-grows = supplier/creditor, debit-grows = customer/debtor). */
function ledgerCheck(bf, closing, entries){
  bf=+bf; closing=+closing;
  if(!isFinite(bf)||!isFinite(closing)) return null;
  const sumD=entries.reduce((s,e)=>s+(+e.debit||0),0);
  const sumC=entries.reduce((s,e)=>s+(+e.credit||0),0);
  const creditGrows=bf+sumC-sumD;   // supplier / Cr balance
  const debitGrows =bf+sumD-sumC;   // customer / Dr balance
  if(Math.abs(creditGrows-closing)<1) return {ok:true,orientation:'credit',computed:creditGrows,printed:closing};
  if(Math.abs(debitGrows-closing)<1)  return {ok:true,orientation:'debit', computed:debitGrows, printed:closing};
  // report the nearer of the two as the computed figure
  const near=Math.abs(creditGrows-closing)<=Math.abs(debitGrows-closing)?creditGrows:debitGrows;
  return {ok:false,orientation:null,computed:near,printed:closing};
}

/* ============================================================
   AI EXTRACTION
   ============================================================ */
async function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Could not read file'));r.readAsDataURL(file);});}
function buildExtractionMessages(b64,mediaType,isPdf){
  const sysHint=`You are a meticulous accounting data extractor. Read the attached document
(a bank statement, invoice, receipt, or hand-written account LEDGER page) and return ONLY a JSON object —
no prose, no markdown fences. If the image is blurry, cropped, glare-covered, or hard to read, say so honestly
via "image_quality":"poor" and set "needs_resend":true. NEVER invent numbers you cannot read; if a value is
unreadable set it to null and lower its confidence. Confidence is 0-100.

DATES: handwritten dates are usually DAY-FIRST (DD.MM.YY or DD/MM/YY). "05.06.26" means 2026-06-05, not June 5th
as month-first. Convert every date to YYYY-MM-DD using day-first reading.

LEDGER PAGES (a bound book with columns Particulars / Debit / Credit / Dr-or-Cr / Balance):
- Read the account holder's name (e.g. "Account of UK Traders") into "account_name", and the page number into "page".
- A first row labelled "B/F" or "Balance brought forward" is the opening balance → put it in "balance_brought_forward".
- For each row, put the figure in "debit" or "credit" (whichever column it sits in), the running figure from the
  Balance column into "balance", and the Dr/Cr letter into "dr_cr". Also mirror amounts: money_out=debit, money_in=credit.
- The last balance shown is "closing_balance".
- SELF-CHECK THE MATH: starting from balance_brought_forward and applying each row (a credit increases a Cr balance,
  a debit decreases it; opposite for a Dr balance), confirm you arrive at closing_balance. If your read numbers do NOT
  reconcile to the printed balances, set "balance_check":"mismatch", explain which row looks wrong in
  "balance_check_note", and lower the confidence on the suspect row(s). If everything reconciles set "balance_check":"ok".

Return exactly this shape:
{"document_type":"bank_statement|invoice|receipt|ledger|unclear","image_quality":"good|fair|poor",
"quality_notes":"","needs_resend":false,"currency":null,"overall_confidence":0,
"account_name":null,"page":null,"party":null,
"balance_brought_forward":null,"closing_balance":null,"balance_check":"ok|mismatch|not_applicable","balance_check_note":"",
"entries":[{"date":"YYYY-MM-DD or null","description":"","reference":"","debit":null,"credit":null,"balance":null,"dr_cr":null,"money_in":null,"money_out":null,"confidence":0}]}
Include every legible row, in the order written.`;
  const docBlock=isPdf?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}
    :{type:'image',source:{type:'base64',media_type:mediaType,data:b64}};
  return [{role:'user',content:[docBlock,{type:'text',text:sysHint}]}];
}
function parseModelJSON(text){if(!text)throw new Error('Empty response');let t=text.replace(/```json/gi,'').replace(/```/g,'').trim();const s=t.indexOf('{'),e=t.lastIndexOf('}');if(s===-1||e===-1)throw new Error('No JSON found');return JSON.parse(t.slice(s,e+1));}
async function extractDocument(file){
  const isPdf=file.type==='application/pdf'; const b64=await fileToBase64(file);
  const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4096,messages:buildExtractionMessages(b64,file.type||'image/jpeg',isPdf)})});
  if(!resp.ok){const t=await resp.text().catch(()=> '');throw new Error('AI service error ('+resp.status+'). '+t.slice(0,120));}
  const data=await resp.json();
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  return parseModelJSON(text);
}

/* ============================================================
   SHARED UI BUILDERS
   ============================================================ */
function stat(lbl,val,sub,tone){const e=el('div',{class:'stat'},el('div',{class:'lbl'},lbl),el('div',{class:'val'},val));if(sub)e.append(el('div',{class:'sub'},tone?el('span',{class:'chip '+tone,style:'font-size:11px'},sub):sub));return e;}
function card(title,body,headExtra){const c=el('div',{class:'card'});c.append(el('div',{class:'hd'},el('h3',{},title),headExtra||el('span')));const bd=el('div',{class:'bd'});bd.append(body);c.append(bd);return c;}

function viewDashboard(v){
  const bankBal=state.bank.reduce((s,e)=>s+(+e.amount||0),0);
  const bookBal=state.books.reduce((s,e)=>s+(+e.amount||0),0);
  const diff=bankBal-bookBal;
  const unmatched=state.bank.filter(e=>!e.matchedId).length+state.books.filter(e=>!e.matchedId).length;
  const recv=state.parties.reduce((s,p)=>s+partyBalance(p),0);
  const overdue=state.invoices.filter(i=>invoiceStatus(i)==='Overdue').reduce((s,i)=>s+invoiceOutstanding(i),0);
  const mExp=monthExpenses();
  v.append(
    el('div',{class:'page-head'},
      el('div',{},el('div',{class:'eyebrow'},state.settings.company),el('h1',{},'Dashboard')),
      el('button',{class:'btn gold',onclick:()=>go('scan')},'＋ Scan a document')),
    el('div',{class:'grid g4',style:'margin-bottom:18px'},
      stat('Receivables',money(recv), overdue>0?money(overdue)+' overdue':'Owed to you', overdue>0?'bad':'ok'),
      stat('Bank vs books',money(diff),Math.abs(diff)<0.01?'✓ Reconciled':unmatched+' open items',Math.abs(diff)<0.01?'ok':'warn'),
      stat('Expenses (month)',money(mExp),'Cash out this month'),
      stat('Bank balance',money(bankBal),state.bank.length+' entries'))
  );
  if(unmatched>0)v.append(el('div',{class:'banner warn',style:'margin-bottom:18px'},el('span',{class:'ic'},'⇄'),
    el('div',{},el('strong',{},unmatched+' item(s) not yet reconciled. '),el('a',{href:'#',onclick:e=>{e.preventDefault();go('reconcile');}},'Open reconciliation →'))));
  if(overdue>0)v.append(el('div',{class:'banner bad',style:'margin-bottom:18px'},el('span',{class:'ic'},'!'),
    el('div',{},el('strong',{},money(overdue)+' is overdue. '),el('a',{href:'#',onclick:e=>{e.preventDefault();go('invoices');}},'Chase invoices →'))));

  const recentInv=[...state.invoices].slice(-5).reverse();
  v.append(el('div',{class:'grid g2'},
    card('Recent invoices',recentInv.length?tableEl(['#','Customer','Outstanding','Status'],recentInv.map(i=>{
      const st=invoiceStatus(i);
      return [i.number,partyName(i.party),{html:`<span class="num">${money(invoiceOutstanding(i))}</span>`,cls:'right'},
        {html:`<span class="chip ${st==='Paid'?'ok':st==='Overdue'?'bad':'neutral'}">${st}</span>`}];
    })):emptyEl('❏','No invoices yet','Create one from the Invoices tab.')),
    card('Top receivables',partyBalances().length?tableEl(['Customer','Balance'],partyBalances().slice(0,6).map(p=>[p.name,{html:`<span class="num">${money(p.bal)}</span>`,cls:'right'}])):emptyEl('☷','No balances yet','Add customers in the Ledgers tab.'))
  ));
}
function monthExpenses(){const m=todayISO().slice(0,7);return state.expenses.filter(e=>(e.date||'').slice(0,7)===m).reduce((s,e)=>s+(+e.amount||0),0);}
function partyBalances(){return state.parties.map(p=>({name:p.name,bal:partyBalance(p)})).filter(p=>Math.abs(p.bal)>0.001).sort((a,b)=>b.bal-a.bal);}

function viewScan(v){

function pickFile(f){scanFile=f;scanResult=null;if(scanFileURL)URL.revokeObjectURL(scanFileURL);scanFileURL=f.type==='application/pdf'?null:URL.createObjectURL(f);renderView();}

function editable(obj,key,display){return `<span contenteditable="true" style="outline:none;border-bottom:1px dashed transparent;min-width:24px;display:inline-block" onfocus="this.style.borderColor='var(--green-2)'" onblur="this.style.borderColor='transparent';window.__edit('${obj._id}','${key}',this.innerText)">${display}</span>`;}
window.__edit=(id,key,val)=>{const e=(scanResult._entries||[]).find(x=>x._id===id);if(!e)return;if(['money_in','money_out','debit','credit','balance'].includes(key)){const n=parseFloat(val.replace(/[^0-9.\-]/g,''));e[key]=isNaN(n)?null:n;}else e[key]=(val==='—'?'':val.trim());};
function commitEntries(target){let added=0;(scanResult._entries||[]).forEach(e=>{const amt=(+e.money_in||+e.credit||0)-(+e.money_out||+e.debit||0);if(!amt&&!e.description)return;state[target].push({id:uid(),date:e.date||todayISO(),desc:e.description||'(no description)',ref:e.reference||'',amount:amt,matchedId:null,source:'scan'});added++;});save(target);toast(`✓ ${added} entr${added===1?'y':'ies'} added`);resetScan();go('reconcile');}
// Import a scanned account-book page into a chosen customer's ledger.
// Orientation-aware so the app's running balance reproduces the printed closing balance.
function commitScanLedger(){
  const r=scanResult, entries=(scanResult._entries||[]).filter(e=>(+e.debit||0)||(+e.credit||0));
  if(!entries.length){toast('No debit/credit lines to save');return;}
  const def=r.account_name||r.party||'';
  const chk=scanResult._chk;
  const swap = chk && chk.ok && chk.orientation==='credit';   // creditor/supplier account
  const body=el('div',{class:'bd'});const f={name:def};
  body.append(el('p',{class:'muted',style:'margin-top:0'},'Save these '+entries.length+' lines as a customer/supplier ledger. The running balance is set so it matches the page'+(r.closing_balance!=null?(' ('+money(r.closing_balance)+')'):'')+'.'),
    el('div',{class:'field'},el('label',{},'Account name'),el('input',{value:def,list:'pl2',oninput:e=>f.name=e.target.value})),
    (()=>{const d=el('datalist',{id:'pl2'});state.parties.forEach(p=>d.append(el('option',{value:p.name})));return d;})(),
    el('button',{class:'btn',style:'width:100%',onclick:()=>{
      if(!f.name){toast('Enter a name');return;}
      ensureParty(f.name);const p=state.parties.find(x=>x.name.toLowerCase()===f.name.toLowerCase());
      if(swap)p.kind='Supplier';
      const fresh=!state.ledger.some(l=>l.partyId===p.id);
      if(fresh && r.balance_brought_forward!=null) p.opening=+r.balance_brought_forward;
      save('parties');
      entries.forEach(e=>{const deb=+e.debit||0,cre=+e.credit||0;
        state.ledger.push({id:uid(),partyId:p.id,date:e.date||todayISO(),particulars:e.description||'(entry)',
          debit: swap?cre:deb, credit: swap?deb:cre, ref:e.reference||'',kind:'manual'});});
      save('ledger');closeModal();resetScan();openParty=p.id;current='parties';renderNav();renderView();
      toast('✓ Saved to '+f.name+'’s ledger');
    }},'Save ledger')
  );
  showModal('Save scanned ledger',body);
}
function openInvoiceFromScan(){const items=(scanResult._entries||[]).filter(e=>e.money_in||e.money_out).map(e=>({desc:e.description||'Item',qty:1,rate:(+e.money_in||+e.money_out||0)}));openInvoiceModal({party:'',date:todayISO(),items:items.length?items:[{desc:'',qty:1,rate:0}],notes:'',prefillParty:scanResult.party||''});}

function autoMatch(){
  state.bank.forEach(e=>e.matchedId=null);state.books.forEach(e=>e.matchedId=null);
  const pairs=computeMatches(state.bank,state.books);
  pairs.forEach(([bId,kId])=>{const b=state.bank.find(x=>x.id===bId),k=state.books.find(x=>x.id===kId);if(b&&k){b.matchedId=kId;k.matchedId=bId;}});
  save('bank');save('books');toast(pairs.length?`✓ Auto-matched ${pairs.length} pair(s)`:'No new matches found');renderView();
}
function manualToggle(side,id){const item=state[side].find(e=>e.id===id);if(item.matchedId){const other=(side==='bank'?state.books:state.bank).find(e=>e.id===item.matchedId);if(other)other.matchedId=null;item.matchedId=null;save('bank');save('books');renderView();return;}const opp=side==='bank'?'books':'bank';openMatchPicker(side,item,opp,state[opp].filter(e=>!e.matchedId));}

  body.append(t);showModal('Choose a match',body);
}

// Build my side as comparable lines (absolute amounts + side label)
function myLines(p){
  return state.ledger.filter(l=>l.partyId===p.id).map(l=>({
    id:l.id, date:l.date, particulars:l.particulars,
    amount:(+l.debit||0)+(+l.credit||0), side:l.debit?'Dr':'Cr'
  }));
}
function theirLines(p){ return (state.recon[p.id]&&state.recon[p.id].entries)||[]; }
function reconMeta(p){ const r=state.recon[p.id]||{}; return {theirBalance:r.theirBalance, asOf:r.asOf}; }
function setRecon(pid, patch){ state.recon[pid]=Object.assign({entries:[]}, state.recon[pid]||{}, patch); save('recon'); }

// pure matching: equal amount (abs), nearest date
function matchLedgers(mine, theirs){
  const M=mine.map(x=>({...x,_u:false})), T=theirs.map(x=>({...x,_u:false}));
  const pairs=[];
  M.forEach(m=>{
    let best=null,bestD=Infinity;
    T.forEach(t=>{ if(t._u)return; if(Math.abs((+m.amount)-(+t.amount))>0.01)return;
      const d=Math.abs(daysBetween(t.date,m.date)); if(d<bestD){bestD=d;best=t;} });
    if(best){best._u=true;m._u=true;pairs.push([m.id,best.id]);}
  });
  return {pairs, unMine:M.filter(x=>!x._u), unTheirs:T.filter(x=>!x._u)};
}
function reconStatus(p){
  const meta=reconMeta(p);
  if(meta.theirBalance==null) return {label:'Not checked', tone:'neutral', diff:null};
  const diff=partyBalance(p)-(+meta.theirBalance||0);
  return {label: Math.abs(diff)<1?'Agreed':'Difference', tone: Math.abs(diff)<1?'ok':'bad', diff};
}

/* ============================================================

   ============================================================ */
function lockNow(){renderLock();}
function renderLock(setup){
  $('#root').innerHTML='';
  const card=el('div',{class:'lockcard'});
  card.append(el('div',{class:'mk'},'Ledger Desk ',el('span',{class:'dot'})));
  card.append(el('div',{class:'muted',style:'margin-top:6px;font-size:13px'},setup?'Set a PIN to protect your books':'Enter your PIN'));
  const inp=el('input',{class:'pininp',type:'password',inputmode:'numeric',maxlength:'12',placeholder:'••••',
    onkeydown:e=>{if(e.key==='Enter')submit();}});
  const inp2=setup?el('input',{class:'pininp',type:'password',inputmode:'numeric',maxlength:'12',placeholder:'confirm',style:'margin-top:10px',onkeydown:e=>{if(e.key==='Enter')submit();}}):null;
  const msg=el('div',{style:'color:var(--bad);font-size:12.5px;min-height:16px;margin-top:8px'});
  async function submit(){
    const pin=inp.value.trim();
    if(setup){
      if(pin.length<4){msg.textContent='Use at least 4 digits';return;}
      if(pin!==inp2.value.trim()){msg.textContent='PINs don’t match';return;}
      const salt=uid()+uid();const hash=await sha256(salt+pin);await DB.set('auth',{salt,hash});unlock();
    } else {
      const auth=await DB.get('auth',null);if(!auth){renderLock(true);return;}
      const hash=await sha256(auth.salt+pin);
      if(hash===auth.hash)unlock();else{msg.textContent='Wrong PIN — try again';inp.value='';inp.focus();}
    }
  }
  card.append(inp);if(inp2)card.append(inp2);
  card.append(el('button',{class:'btn',style:'width:100%;margin-top:14px',onclick:submit},setup?'Set PIN & continue':'Unlock'));
  card.append(msg);
  if(setup)card.append(el('div',{class:'muted',style:'font-size:11px;margin-top:10px;line-height:1.4'},'This keeps casual viewers out. It is not a substitute for hosting behind a real login for sensitive company data.'));
  $('#root').append(el('div',{class:'lock'},card));
  setTimeout(()=>inp.focus(),50);
}

    el('button',{class:'btn',style:'width:100%',onclick:async()=>{const auth=await DB.get('auth',null);const curHash=await sha256(auth.salt+f.cur.trim());if(curHash!==auth.hash){toast('Current PIN is wrong');return;}if(f.n1.trim().length<4){toast('New PIN too short');return;}if(f.n1.trim()!==f.n2.trim()){toast('New PINs don’t match');return;}const salt=uid()+uid();const hash=await sha256(salt+f.n1.trim());await DB.set('auth',{salt,hash});closeModal();toast('✓ PIN changed');}},'Change PIN'));
  showModal('Change PIN',body);
}
